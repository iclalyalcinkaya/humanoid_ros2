<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Humanoid Robot Servo Topic Control</title>
    <script src="https://unpkg.com/eventemitter3@latest/dist/eventemitter3.umd.min.js"></script>
    <script>
    // Trick the ROS UMD bundler into finding what it expects
    window.eventemitter2 = { EventEmitter2: window.EventEmitter3, EventEmitter: window.EventEmitter3 };
    window.EventEmitter2 = window.EventEmitter3;
    </script>
    <script src="./roslib_6river.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; display: inline-block; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 850px; }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; }
        .connected { background: #dcfce7; color: #166534; }
        .disconnected { background: #fee2e2; color: #991b1b; }
        .control-row { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #eee; gap: 10px;}
        .motors-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        input[type=range] { flex-grow: 1; margin: 0 10px; accent-color: #8c00ff; }
        .val-display { width: 35px; text-align: right; font-family: monospace; font-weight: bold; color: #8c00ff; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; background: #8c00ff; color: #ffffff; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #7300d1; }
        .mode-btn { background: #8c00ff; width: 120px; }
        .mode-btn.active { background: #57009e; outline: 2px solid #000; }
        .step-btn { padding: 2px 6px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 4px; background: #e2e8f0; font-size: 12px; font-weight: bold; color: #334155; transition: 0.1s;}
        .step-btn:hover { background: #cbd5e1; }
        .pid-group { display: flex; align-items: center; gap: 4px; margin: 0 10px; }
        .sim-btn{ background: #8c00ff; width: 120px; }
        .sim-btn.active { background: #57009e; outline: 2px solid #000; }
    </style>
</head>

<body>
    <div class="card">
        <h1>Humanoid Robot Servo Topic Control</h1>

        <div id="statusIndicator" class="status disconnected">
            <span id="connecting">Connecting...</span>
            <span id="connected" style="display:none;">Connected to Robot</span>
            <span id="error" style="display:none;">Error in backend!</span>
            <span id="closed" style="display:none;">Connection closed.</span>
        </div>

        <div class="control-row" style="justify-content: center; gap: 20px;">
            <span><strong>Presets:</strong></span>
            <button class="btn mode-btn" id="btnMode1" onclick="setMode(1)">Pose</button>
            <button class="btn mode-btn" id="btnMode2" onclick="setMode(2)">Wave</button>
            <button class="btn mode-btn" id="btnMode3" onclick="setMode(3)">Speak</button>
            <button class="btn mode-btn" id="btnMode4" onclick="setMode(4)">Home</button>
            <button class="btn sim-btn" id="btnSim" onclick="simActive()">Sim Active</button>
        </div>

        <div class="control-row" style="justify-content: center; gap: 20px;">
            <button class="btn"><a href="action_index.html" style="color: #ffffff;">Action Page</a></button>
            <button class="btn" onclick="cancelAll()">STOP ALL</button>
            <div class="pid-group">
                <label for="speed">Speed:</label>
                <button class="step-btn" onclick="adjustSpeed('speed', -10)">-10</button>
                <button class="step-btn" onclick="adjustSpeed('speed', -1)">-1</button>
                <input type="number" id="speed" value="5" step="0.1" style="width:65px; text-align:center;">
                <button class="step-btn" onclick="adjustSpeed('speed', 1)">+1</button>
                <button class="step-btn" onclick="adjustSpeed('speed', 10)">+10</button>
            </div>
            <div class="pid-group">
                <input type="text" id="robotIp" value="10.225.237.128" style="padding: 5px; width: 120px;">
                <button class="btn" onclick="connectToROS()">Connect</button>
            </div>
        </div>

        <hr>
        <h3>Motor Positions (Manual Override)</h3>
        <div id="motorsContainer" class="motors-grid"></div>
    </div>

    <script>
        //const myClientId = "client_" + Math.random().toString(36).substr(2, 9);
        //console.log("My Client ID is:", myClientId);

        function adjustSpeed(paramId, delta, adj = true) {
            let inputField = document.getElementById(paramId);
            let newVal = adj === true ? parseFloat(inputField.value) + delta : delta;
            inputField.value = newVal.toFixed(0);
        }

        function adjustMotor(motorId, delta) {
            let slider = document.getElementById(`slider${motorId}`);
            let newVal = parseInt(slider.value) + delta;
            if (newVal > 180) newVal = 180;
            if (newVal < 0) newVal = 0;
            
            slider.value = newVal;
            document.getElementById(`label${motorId}`).innerText = newVal + '°';
            sendMotorGoal(motorId); // Publish to Topic
        }

        // --- BUILD THE UI ---
        const container = document.getElementById("motorsContainer");
        for (let i = 1; i <= 12; i++) {
            container.innerHTML += `
                <div class="control-row">
                    <label for="slider${i}" style="width: 35px; text-align: left; font-weight: bold;">M${i}</label>
                    <button class="step-btn" onclick="adjustMotor(${i}, -10)">-10</button>
                    <button class="step-btn" onclick="adjustMotor(${i}, -1)">-1</button>
                    <input type="range" id="slider${i}" min="0" max="180" value="90" 
                           oninput="document.getElementById('label${i}').innerText = this.value + '°'"
                           onchange="sendMotorGoal(${i})">
                    <button class="step-btn" onclick="adjustMotor(${i}, 1)">+1</button>
                    <button class="step-btn" onclick="adjustMotor(${i}, 10)">+10</button>
                    <div class="val-display" id="label${i}">90°</div>
                </div>`;
        }

        // --- CONNECT TO ROS ---
        let ros;
        let modeTopic;
        let manualCmdTopic;
        let simActiveTopic;
        let checked = true;
        let ID;
        let myClientId;

        function connectToROS() {
            if(checked){
                const ip = document.getElementById('robotIp').value;
                if(!ip) { alert("Please enter an IP address"); return; }        
                ros = new ROSLIB.Ros({ url: 'ws://' + ip + ':9090' });

                ros.on('error', function(error) {
                    document.getElementById('statusIndicator').className = "status disconnected";
                    document.getElementById('connecting').style.display = 'none';
                    document.getElementById('connected').style.display = 'none';
                    document.getElementById('closed').style.display = 'none';
                    document.getElementById('error').style.display = 'inline';
                    console.log(error);
                });

                ros.on('connection', function() {
                    document.getElementById('statusIndicator').className = "status connected";
                    document.getElementById('connecting').style.display = 'none';
                    document.getElementById('error').style.display = 'none';
                    document.getElementById('closed').style.display = 'none';
                    document.getElementById('connected').style.display = 'inline';                    
                });

                ros.on('close', function() {
                    document.getElementById('statusIndicator').className = "status disconnected";
                    document.getElementById('connecting').style.display = 'none';
                    document.getElementById('connected').style.display = 'none';
                    document.getElementById('closed').style.display = 'inline';
                });

                // --- DEFINE TOPICS (No more Action Clients!) ---
                modeTopic = new ROSLIB.Topic({
                    ros : ros,
                    name : '/set_mode',
                    messageType : 'servo_interfaces/msg/SetMode' 
                });

                manualCmdTopic = new ROSLIB.Topic({
                    ros : ros,
                    name : '/web_cmd',
                    messageType : 'servo_interfaces/msg/SetPwm' 
                });

                simActiveTopic = new ROSLIB.Topic({
                    ros : ros,
                    name : '/sim_active',
                    messageType : 'std_msgs/msg/Bool'
                });

                ID = new ROSLIB.Topic({
                    ros : ros,
                    name : '/connected_clients',
                    messageType : 'rosbridge_msgs/msg/ConnectedClients'
                });

                ID.subscribe(function(msg) {
                    myClientId = String(msg.clients[msg.clients.length -1].connection_time.sec);
                    console.log("My Client ID is:", myClientId);
                    ID.unsubscribe();
                });
                checked = false;
            }
        }

        // --- SEND COMMANDS ---
        let sim = true;
        function simActive(){
            if(sim){
                sim = false;
                document.getElementById(`btnSim`).classList.add('active');
            }else{
                sim = true;
                document.getElementById(`btnSim`).classList.remove('active');
            }
            if(simActiveTopic) {
                var msg = {
                    data: sim
                };
                simActiveTopic.publish(msg);
                console.log(`Simulation: ${sim}`);
            }
        }

        function setMode(modeNum) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btnMode${modeNum}`).classList.add('active');

            if(modeTopic) {
                var msg = {
                    mode: modeNum,
                    client_id: myClientId
                };
                modeTopic.publish(msg);
                console.log(`Sent Mode: ${modeNum}`);
            }
        }

        function cancelAll() {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            
            // Sending Mode 0 tells Python to break the background loop and stop
            if(modeTopic) {
                var msg = {
                    mode: 0, 
                    client_id: myClientId
                };
                modeTopic.publish(msg);
                console.log("Sent STOP ALL (Mode 0)");
            }
        }

        function sendMotorGoal(motorId) {
            // Sends manual slider adjustments to Python
            if(manualCmdTopic) {
                let pos = parseInt(document.getElementById(`slider${motorId}`).value);
                let currentSpeed = parseFloat(document.getElementById('speed').value);

                var msg = {
                    motor_num: motorId,
                    target_position: pos,
                    speed: currentSpeed,
                    client_id: myClientId
                };
                manualCmdTopic.publish(msg);
                console.log(`Manual Override: Motor ${motorId} -> ${pos}°`);
            }
        }
    </script>
</body>
</html>
